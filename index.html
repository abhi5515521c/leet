<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode C++ | Q1–100 Compendium</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12;
            --surface: #14141d;
            --surface2: #1a1a26;
            --accent: #b8b8ff;
            --accent-glow: rgba(184, 184, 255, 0.4);
            --border: rgba(184, 184, 255, 0.15);
            --border-accent: rgba(184, 184, 255, 0.5);
            --text: #c0c0e0;
            --dim: #606080;
            --diff-easy: #80ff80;
            --diff-medium: #ffff80;
            --diff-hard: #ff8080;
            --mono: 'Space Mono', monospace;
            --pixel: 'VT323', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text);
            font-family: var(--mono);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ─── NOISE & SCANLINES ─── */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                url("https://grainy-gradients.vercel.app/noise.svg"),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 150px, 100% 3px;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.1;
            mix-blend-mode: overlay;
        }

        /* ─── GRID DOTS ─── */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(var(--accent) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            opacity: 0.1;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
            position: relative;
        }

        /* ─── HEADER ─── */
        header {
            text-align: left;
            margin-bottom: 5rem;
            border-left: 3px solid var(--accent);
            padding-left: 2rem;
            position: relative;
        }

        header::before {
            content: "SECURE_STORAGE_v4.0.2";
            position: absolute;
            top: -2rem;
            left: 2rem;
            font-family: var(--pixel);
            font-size: 1.1rem;
            color: var(--accent);
            letter-spacing: 3px;
        }

        header h1 {
            font-size: clamp(3.5rem, 12vw, 6.5rem);
            font-family: var(--pixel);
            font-weight: 400;
            text-transform: uppercase;
            color: var(--accent);
            line-height: 0.85;
            text-shadow: 0 0 25px var(--accent-glow);
        }

        header p {
            color: var(--dim);
            font-family: var(--pixel);
            font-size: 1.4rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 0.75rem;
        }

        .ai-badge {
            display: inline-flex;
            align-items: center;
            gap: 1.25rem;
            margin-top: 2.5rem;
            padding: 0.75rem 1.75rem;
            background: transparent;
            border: 1px solid var(--border-accent);
            font-size: 1rem;
            font-family: var(--pixel);
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .ai-dot {
            width: 12px;
            height: 12px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            animation: pulse 1s infinite steps(2);
        }

        /* ─── CONTROLS ─── */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            margin-bottom: 5rem;
            background: var(--surface);
            padding: 2.5rem;
            border: 1px solid var(--border);
            position: relative;
        }

        .controls::after {
            content: "";
            position: absolute;
            top: -5px;
            right: -5px;
            width: 15px;
            height: 15px;
            border-top: 2px solid var(--accent);
            border-right: 2px solid var(--accent);
        }

        .search-container {
            position: relative;
            flex: 1;
        }

        #search {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 1.25rem 1.5rem 1.25rem 3.5rem;
            color: var(--accent);
            font-family: var(--mono);
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
            text-transform: uppercase;
        }

        #search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            pointer-events: none;
            opacity: 0.6;
            z-index: 2;
        }

        .btn-row {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--dim);
            padding: 0.75rem 2rem;
            font-family: var(--pixel);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(184, 184, 255, 0.05);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* ─── CUSTOM SELECT ─── */
        .custom-select {
            position: relative;
            min-width: 220px;
        }

        .select-trigger {
            height: 50px;
            padding: 0 1.5rem;
            border: 1px solid var(--border);
            background: #000;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: var(--pixel);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .select-options {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #0d0d12;
            border: 1px solid var(--accent);
            border-top: none;
            z-index: 1000;
            display: none;
        }

        .select-options.open {
            display: block;
        }

        .select-option {
            padding: 1rem 1.5rem;
            font-family: var(--pixel);
            font-size: 1.1rem;
            color: var(--dim);
            cursor: pointer;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        .select-option:hover {
            color: var(--accent);
            background: rgba(184, 184, 255, 0.1);
        }

        .select-option.selected {
            color: var(--accent);
            background: rgba(184, 184, 255, 0.05);
        }

        /* ─── STATUS ─── */
        .status-bar {
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            font-family: var(--pixel);
            color: var(--dim);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-bar span {
            color: var(--accent);
        }

        .section-label {
            font-family: var(--pixel);
            font-size: 1.2rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 2rem 0;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .section-label::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ─── NUMBER GRID ─── */
        .number-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(62px, 1fr));
            gap: .6rem;
            margin-bottom: 2.5rem;
        }

        .nbox {
            aspect-ratio: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 0.9rem;
            color: var(--dim);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* ─── NUMBER GRID ─── */
        .number-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 0.75rem;
            margin-bottom: 5rem;
        }

        .nbox {
            aspect-ratio: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: var(--pixel);
            font-size: 1.4rem;
            color: var(--dim);
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }

        .nbox:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--surface2);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(1.05);
            z-index: 10;
        }

        .nbox.cached {
            color: var(--text);
            border-color: var(--border-accent);
        }

        .nbox .tip {
            font-size: 0.6rem;
            letter-spacing: 1px;
            opacity: 0.5;
            text-transform: uppercase;
        }

        .nbox.copied-box {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        /* ─── CARDS ─── */
        .problem-card {
            background: var(--surface);
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            position: relative;
            transition: all 0.3s;
        }

        .problem-card:hover {
            border-color: var(--border-accent);
            box-shadow: -10px 0 0 var(--accent);
        }

        .card-header {
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            cursor: pointer;
            user-select: none;
            background: rgba(184, 184, 255, 0.02);
        }

        .num-badge {
            font-family: var(--pixel);
            font-size: 1.1rem;
            color: var(--accent);
            border: 1px solid var(--border-accent);
            padding: 0.25rem 0.75rem;
            min-width: 50px;
            text-align: center;
        }

        .problem-title {
            flex: 1;
            font-weight: 400;
            font-size: 1.5rem;
            font-family: var(--pixel);
            letter-spacing: 2px;
            color: #fff;
            text-transform: uppercase;
        }

        .meta-tags {
            display: flex;
            gap: 1.25rem;
            align-items: center;
        }

        .tag {
            font-family: var(--pixel);
            font-size: 1rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .diff-tag {
            font-weight: 400;
            letter-spacing: 2px;
        }

        .diff-easy { color: var(--diff-easy); }
        .diff-medium { color: var(--diff-medium); }
        .diff-hard { color: var(--diff-hard); }

        .chevron {
            color: var(--dim);
            transition: transform 0.3s steps(4);
        }

        .chevron.open {
            transform: rotate(180deg);
            color: var(--accent);
        }

        /* ─── CODE CONTAINER ─── */
        .code-container {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s steps(10);
            background: #000;
        }

        .code-container.open {
            grid-template-rows: 1fr;
        }

        .code-content {
            overflow: hidden;
            position: relative;
            border-top: 1px solid var(--border);
        }

        .copy-btn {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--accent);
            font-family: var(--pixel);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            border-color: var(--accent);
            background: rgba(184, 184, 255, 0.05);
        }

        .copy-btn.copied-btn {
            border-color: var(--diff-easy);
            color: var(--diff-easy);
        }

        pre {
            padding: 3rem 2rem 2rem;
            font-family: var(--mono);
            font-size: 0.85rem;
            line-height: 1.6;
            overflow-x: auto;
            color: #d1d5db;
        }

        /* Syntax highlight classes */
        .k { color: var(--accent); font-weight: 700; }
        .cmt { color: #606080; font-style: italic; }
        .s { color: var(--diff-medium); }
        .n { color: #d1d1ff; }
        .f { color: #e0e0ff; }

        /* ─── ANIMATIONS ─── */
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-18px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        @keyframes borderPulse {

            0%,
            100% {
                border-color: var(--accent)
            }

            50% {
                border-color: rgba(99, 179, 237, .2)
            }
        }

        /* ─── TOAST ─── */
        #toast {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #000;
            color: var(--accent);
            padding: 1rem 2rem;
            font-family: var(--pixel);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            border: 1px solid var(--accent);
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s steps(4);
            z-index: 10000;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        #toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0d0d12;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-accent);
            border: 2px solid #0d0d12;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; filter: brightness(1); }
            50% { opacity: 0.5; filter: brightness(1.5); }
        }

        @media (max-width: 768px) {
            .container { padding: 2rem 1rem; }
            header { margin-bottom: 3rem; }
            header h1 { font-size: 4rem; }
            .controls { padding: 1.5rem; }
            .btn-row { gap: 1rem; }
            .btn { width: 100%; }
            .custom-select { width: 100%; }
        }
    </style>
</head>

<body>
    <div class="container">

        <header>
            <h1>LeetCode C++ Solutions</h1>
            <p>Q1 – Q100 Complete Compendium</p>
            <div class="ai-badge"><span class="ai-dot"></span> Built By Sai Abhijeet</div>
        </header>

        <div class="controls">
            <div class="search-container">
                <div class="search-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
                <input type="text" id="search" placeholder="Search by problem number or keywords..."
                    oninput="filterAll()">
                <div class="search-glow"></div>
            </div>
            <div class="btn-row">
                <div class="custom-select" id="difficultyDropdown">
                    <div class="select-trigger" onclick="toggleDropdown()">
                        <span id="selectedDiffText">All Difficulties</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </div>
                    <div class="select-options" id="dropdownOptions">
                        <div class="select-option selected" onclick="selectOption('', 'All Difficulties', this)">All
                            Difficulties</div>
                        <div class="select-option" onclick="selectOption('Easy', 'Easy', this)">Easy</div>
                        <div class="select-option" onclick="selectOption('Medium', 'Medium', this)">Medium</div>
                        <div class="select-option" onclick="selectOption('Hard', 'Hard', this)">Hard</div>
                    </div>
                </div>
                <button class="btn" onclick="expandAll()" title="Expand All">↕ Expand</button>
                <button class="btn" onclick="collapseAll()" title="Collapse All">↕ Collapse</button>
            </div>
        </div>

        <div class="status-bar" id="statusBar">Loading solutions...</div>

        <div class="section-label">Quick Copy Grid — click to copy solution instantly</div>
        <div id="numberGrid" class="number-grid"></div>

        <div class="section-label">Detailed Solutions</div>
        <div id="cards"></div>

    </div>

    <div id="toast">Copied!</div>

    <script src="data.js"></script>
    <script>
        // State
        let visibleProblems = [...allProblems];
        let currentDifficulty = "";

        function diffClass(d) { return d === 'Easy' ? 'diff-easy' : d === 'Hard' ? 'diff-hard' : 'diff-medium'; }

        // ─── CUSTOM DROPDOWN LOGIC ───
        function toggleDropdown() {
            document.getElementById('dropdownOptions').classList.toggle('open');
        }

        function selectOption(val, text, el) {
            currentDifficulty = val;
            document.getElementById('selectedDiffText').textContent = text;
            document.getElementById('dropdownOptions').classList.remove('open');

            // UI state
            document.querySelectorAll('.select-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');

            filterAll();
        }

        // Close dropdown when clicking outside
        window.addEventListener('click', (e) => {
            if (!document.getElementById('difficultyDropdown').contains(e.target)) {
                document.getElementById('dropdownOptions').classList.remove('open');
            }
        });

        // ─── RENDER NUMBER GRID ───
        function renderGrid() {
            const grid = document.getElementById('numberGrid');
            grid.innerHTML = allProblems.map(([num, title, diff]) => {
                return `<div class="nbox cached" id="nbox-${num}" onclick="handleNboxClick(${num})" title="${title} (${diff})">
      <span>${num}</span>
      <span class="tip">Ready</span>
    </div>`;
            }).join('');
        }

        // ─── RENDER CARDS ───
        function renderCards() {
            const container = document.getElementById('cards');
            container.innerHTML = visibleProblems.map(([num, title, diff]) => {
                const hc = hardcoded[num];
                return `<div class="problem-card" id="card-${num}">
      <div class="card-header" onclick="toggleCard(${num})">
        <span class="num-badge">#${num}</span>
        <span class="problem-title">${title}</span>
        <div class="meta-tags">
          ${hc ? `<span class="tag">${hc.time}</span><span class="tag">${hc.space}</span>` : ''}
          <span class="tag diff-tag ${diffClass(diff)}">${diff}</span>
        </div>
        <span class="chevron" id="ch-${num}">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </span>
      </div>
      <div class="code-container" id="cw-${num}">
        <div class="code-content" id="cc-${num}">
          <button class="copy-btn" onclick="copyCode(${num},this)">Copy</button>
          <pre>${hlCode(hc ? hc.code : '// Solution not found')}</pre>
        </div>
      </div>
    </div>`;
            }).join('');
        }

        // ─── TOGGLE CARD ───
        function toggleCard(num) {
            const cw = document.getElementById('cw-' + num);
            const ch = document.getElementById('ch-' + num);
            const isOpen = cw.classList.toggle('open');
            ch.classList.toggle('open', isOpen);
        }

        // ─── COPY ───
        async function copyCode(num, btn) {
            const hc = hardcoded[num];
            if (!hc) return;
            try {
                await navigator.clipboard.writeText(hc.code);
                btn.classList.add('copied-btn');
                btn.textContent = 'Copied!';
                showToast('Copied #' + num + ' to clipboard');
                setTimeout(() => { btn.classList.remove('copied-btn'); btn.textContent = 'Copy'; }, 2000);
            } catch (e) { }
        }

        async function handleNboxClick(num) {
            const nbox = document.getElementById('nbox-' + num);
            const hc = hardcoded[num];
            if (!hc) return;

            // Auto-open card
            const cw = document.getElementById('cw-' + num);
            const ch = document.getElementById('ch-' + num);
            if (cw && !cw.classList.contains('open')) {
                cw.classList.add('open');
                if (ch) ch.classList.add('open');
            }

            try {
                await navigator.clipboard.writeText(hc.code);
                const orig = nbox.innerHTML;
                nbox.classList.add('copied-box');
                nbox.innerHTML = '<span>✓</span>';
                showToast('Copied #' + num + ': ' + hc.title);
                setTimeout(() => { nbox.classList.remove('copied-box'); nbox.innerHTML = orig; }, 2000);
            } catch (e) { }

            // Scroll card into view
            const card = document.getElementById('card-' + num);
            if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // ─── FILTER ───
        function filterAll() {
            const q = document.getElementById('search').value.toLowerCase().trim();
            const diff = currentDifficulty;

            visibleProblems = allProblems.filter(([num, title, d]) => {
                const matchQ = !q || String(num).includes(q) || title.toLowerCase().includes(q);
                const matchD = !diff || d === diff;
                return matchQ && matchD;
            });

            renderCards();

            allProblems.forEach(([num, , d]) => {
                const nbox = document.getElementById('nbox-' + num);
                if (!nbox) return;
                const matchQ = !q || String(num).includes(q) || allProblems.find(p => p[0] === num)?.[1].toLowerCase().includes(q);
                const matchD = !diff || d === diff;
                nbox.style.display = (matchQ && matchD) ? '' : 'none';
            });

            document.getElementById('statusBar').innerHTML =
                `Showing <span>${visibleProblems.length}</span> of <span>${allProblems.length}</span> solutions`;
        }

        function expandAll() {
            visibleProblems.forEach(([num]) => {
                const cw = document.getElementById('cw-' + num);
                const ch = document.getElementById('ch-' + num);
                if (cw && !cw.classList.contains('open')) {
                    cw.classList.add('open');
                    if (ch) ch.classList.add('open');
                }
            });
        }

        function collapseAll() {
            allProblems.forEach(([num]) => {
                const cw = document.getElementById('cw-' + num);
                const ch = document.getElementById('ch-' + num);
                if (cw) cw.classList.remove('open');
                if (ch) ch.classList.remove('open');
            });
        }

        // ─── SYNTAX HIGHLIGHT ───
        function hlCode(code) {
            const esc = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return esc
                .replace(/(\/\/.+)/g, '<span class="cmt">$1</span>')
                .replace(/("(?:[^"\\]|\\.)*")/g, '<span class="s">$1</span>')
                .replace(/\b(class|struct|public|private|protected|using|namespace|return|if|else|for|while|do|new|delete|nullptr|true|false|const|static|inline|auto|void|bool|int|long|short|char|double|float|unsigned|signed|size_t|string|vector|unordered_map|unordered_set|map|set|queue|stack|deque|pair|tuple|shared_ptr|unique_ptr|include|define)\b/g, '<span class="k">$1</span>')
                .replace(/\b(\d+[uUlLfF]*)\b/g, '<span class="n">$1</span>')
                .replace(/(\w+)(?=\s*\()/g, '<span class="f">$1</span>');
        }

        // ─── TOAST ───
        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
        }

        // ─── INIT ───
        renderGrid();
        renderCards();
        document.getElementById('statusBar').innerHTML =
            `All <span>${allProblems.length}</span> solutions loaded and ready for instant use`;
    </script>
</body>

</html>
