              code:`#include <vector>
#include <unordered_map>
using namespace std;

class Solution {
public:
    vector<int> twoSum(vector<int>& nums, int target) {
        unordered_map<int, int> seen;
        for (int i = 0; i < (int)nums.size(); i++) {
            int complement = target - nums[i];
            if (seen.count(complement))
                return { seen[complement], i };
            seen[nums[i]] = i;
        }
        return {};
    }
};`},
            { num:2, title:"Add Two Numbers", time:"O(max(m,n))", space:"O(max(m,n))",
              code:`struct ListNode {
    int val;
    ListNode* next;
    ListNode(int x) : val(x), next(nullptr) {}
};

class Solution {
public:
    ListNode* addTwoNumbers(ListNode* l1, ListNode* l2) {
        ListNode dummy(0);
        ListNode* cur = &dummy;
        int carry = 0;
        while (l1 || l2 || carry) {
            int sum = carry;
            if (l1) { sum += l1->val; l1 = l1->next; }
            if (l2) { sum += l2->val; l2 = l2->next; }
            carry = sum / 10;
            cur->next = new ListNode(sum % 10);
            cur = cur->next;
        }
        return dummy.next;
    }
};`},
            { num:3, title:"Longest Substring Without Repeating Characters", time:"O(n)", space:"O(min(n,|Σ|))",
              code:`#include <string>
#include <unordered_map>
using namespace std;

class Solution {
public:
    int lengthOfLongestSubstring(string s) {
        unordered_map<char, int> last;
        int maxLen = 0, left = 0;
        for (int right = 0; right < (int)s.size(); right++) {
            if (last.count(s[right]) && last[s[right]] >= left)
                left = last[s[right]] + 1;
            last[s[right]] = right;
            maxLen = max(maxLen, right - left + 1);
        }
        return maxLen;
    }
};`},
            { num:7, title:"Reverse Integer", time:"O(log x)", space:"O(1)",
              code:`#include <climits>
using namespace std;

class Solution {
public:
    int reverse(int x) {
        int rev = 0;
        while (x != 0) {
            int digit = x % 10;
            x /= 10;
            if (rev > INT_MAX / 10 || (rev == INT_MAX / 10 && digit > 7))
                return 0;
            if (rev < INT_MIN / 10 || (rev == INT_MIN / 10 && digit < -8))
                return 0;
            rev = rev * 10 + digit;
        }
        return rev;
    }
};`},

              code:`class Solution {
public:
    bool isPalindrome(int x) {
        if (x < 0 || (x % 10 == 0 && x != 0)) return false;
        int reversed = 0;
        while (x > reversed) {
            reversed = reversed * 10 + x % 10;
            x /= 10;
        }
        return x == reversed || x == reversed / 10;
    }
};`},

            { num:29, title:"Divide Two Integers", time:"O(log² n)", space:"O(1)",
              code:`#include <climits>
using namespace std;

class Solution {
public:
    int divide(int dividend, int divisor) {
        if (dividend == INT_MIN && divisor == -1) return INT_MAX;
        long a = abs((long)dividend), b = abs((long)divisor);
        int sign = (dividend > 0) == (divisor > 0) ? 1 : -1;
        long result = 0;
        while (a >= b) {
            long temp = b, multiple = 1;
            while (a >= (temp << 1)) {
                temp <<= 1;
                multiple <<= 1;
            }
            a -= temp;
            result += multiple;
        }
        return (int)(sign * result);
    }
};`},
            { num:35, title:"Search Insert Position", time:"O(log n)", space:"O(1)",
              code:`#include <vector>
using namespace std;

class Solution {
public:
    int searchInsert(vector<int>& nums, int target) {
        int left = 0, right = (int)nums.size() - 1;
        while (left <= right) {
            int mid = left + (right - left) / 2;
            if (nums[mid] == target) return mid;
            else if (nums[mid] < target) left = mid + 1;
            else right = mid - 1;
        }
        return left;
    }
};`},
            { num:51, title:"N-Queens", time:"O(n!)", space:"O(n)",
              code:`#include <vector>
#include <string>
using namespace std;

class Solution {
    vector<vector<string>> res;
    void solve(int row, int n, vector<string>& board,
               vector<bool>& col, vector<bool>& d1, vector<bool>& d2) {
        if (row == n) { res.push_back(board); return; }
        for (int c = 0; c < n; c++) {
            if (col[c] || d1[row-c+n] || d2[row+c]) continue;
            board[row][c] = 'Q';
            col[c] = d1[row-c+n] = d2[row+c] = true;
            solve(row+1, n, board, col, d1, d2);
            board[row][c] = '.';
            col[c] = d1[row-c+n] = d2[row+c] = false;
        }
    }
public:
    vector<vector<string>> solveNQueens(int n) {
        vector<string> board(n, string(n, '.'));
        vector<bool> col(n,false), d1(2*n,false), d2(2*n,false);
        solve(0, n, board, col, d1, d2);
        return res;
    }
};`},

class Solution {

    int lengthOfLastWord(string s) {

            { num:67, title:"Add Binary", time:"O(max(m,n))", space:"O(max(m,n))",
              code:`#include <string>
#include <algorithm>
using namespace std;

class Solution {
public:
    string addBinary(string a, string b) {
        string res = "";
        int i = (int)a.size()-1, j = (int)b.size()-1, carry = 0;
        while (i >= 0 || j >= 0 || carry) {
            int sum = carry;
            if (i >= 0) sum += a[i--] - '0';
            if (j >= 0) sum += b[j--] - '0';
            res += (char)('0' + sum % 2);
            carry = sum / 2;
        }
        reverse(res.begin(), res.end());
        return res;
    }
};`},
            { num:78, title:"Subsets", time:"O(n·2ⁿ)", space:"O(n·2ⁿ)",
              code:`#include <vector>
using namespace std;

class Solution {
public:
    vector<vector<int>> subsets(vector<int>& nums) {
        int n = (int)nums.size();
        vector<vector<int>> result;
        for (int mask = 0; mask < (1 << n); mask++) {
            vector<int> subset;
            for (int i = 0; i < n; i++)
                if (mask & (1 << i))
                    subset.push_back(nums[i]);
            result.push_back(subset);
        }
        return result;
    }
};`},

        while (left < right) {

            while (left < right && !isalnum(s[right])) right--;

              code:`#include <string>
#include <sstream>
#include <vector>
using namespace std;

class Solution {
public:
    string reverseWords(string s) {
        istringstream iss(s);
        vector<string> words;
        string word;
        while (iss >> word) words.push_back(word);
        string res = "";
        for (int i = (int)words.size()-1; i >= 0; i--) {
            if (i != (int)words.size()-1) res += " ";
            res += words[i];
        }
        return res;
    }
};`},
            { num:179, title:"Largest Number", time:"O(n log n)", space:"O(n)",
              code:`#include <vector>
#include <string>
#include <algorithm>
using namespace std;

class Solution {
public:
    string largestNumber(vector<int>& nums) {
        vector<string> strs;
        for (int n : nums) strs.push_back(to_string(n));
        sort(strs.begin(), strs.end(),
             [](const string& a, const string& b) {
                 return a + b > b + a;
             });
        if (strs[0] == "0") return "0";
        string res = "";
        for (auto& s : strs) res += s;
        return res;
    }
};`},
            { num:204, title:"Count Primes", time:"O(n log log n)", space:"O(n)",
              code:`#include <vector>
using namespace std;

class Solution {
public:
    int countPrimes(int n) {
        if (n < 2) return 0;
        vector<bool> isPrime(n, true);
        isPrime[0] = isPrime[1] = false;
        for (int i = 2; (long long)i*i < n; i++) {
            if (!isPrime[i]) continue;
            for (int j = i*i; j < n; j += i)
                isPrime[j] = false;
        }
        int count = 0;
        for (bool p : isPrime) if (p) count++;
        return count;
    }
};`},

              code:`#include <vector>
using namespace std;

class Solution {
public:
    int missingNumber(vector<int>& nums) {
        int n = (int)nums.size();
        int expected = n * (n + 1) / 2;
        int actual = 0;
        for (int x : nums) actual += x;

class Solution {

        function toggleCard(idx) {
            const container = document.getElementById('cw-' + idx);
            const chevron = document.getElementById('ch-' + idx);
            const isOpen = container.classList.toggle('open');
            chevron.classList.toggle('open', isOpen);
        }

        function copyCode(idx, btn) {
            const code = problems[idx].code;
            navigator.clipboard.writeText(code).then(() => {
                const isNumberBox = btn.classList.contains('number-box');
                const originalContent = btn.innerHTML;
                
                btn.classList.add('copied');
                if (!isNumberBox) {
                    btn.textContent = 'Copied!';
                }
                
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function expandAll() {
            problems.forEach((_, i) => {
                const card = document.getElementById('card-' + i);
                if (card && card.style.display !== 'none') {
                    document.getElementById('cw-' + i).classList.add('open');
                    document.getElementById('ch-' + i).classList.add('open');
                }
            });
        }

        function collapseAll() {
            problems.forEach((_, i) => {
                document.getElementById('cw-' + i).classList.remove('open');
                document.getElementById('ch-' + i).classList.remove('open');
            });
        }

        function filterCards() {
            const q = document.getElementById('search').value.toLowerCase().trim();
            let visible = 0;
            problems.forEach((p, i) => {
                const card = document.getElementById('card-' + i);
                const nbox = document.getElementById('nbox-' + i);
                const match = !q || String(p.num).includes(q) || p.title.toLowerCase().includes(q);
                
                card.style.display = match ? '' : 'none';
                if (nbox) nbox.style.display = match ? 'flex' : 'none';
                
                if (match) visible++;
            });
            document.getElementById('count').textContent = `Showing ${visible} of ${problems.length} solutions`;
        }

        function renderCards() {
            const container = document.getElementById('cards');
            container.innerHTML = problems.map((p, i) => `
                <div class="problem-card" id="card-${i}">
                    <div class="card-header" onclick="toggleCard(${i})">
                        <span class="num-badge">#${p.num}</span>
                        <span class="problem-title">${p.title}</span>
                        <div class="meta-tags">
                            <span class="tag">${p.time}</span>
                            <span class="tag">${p.space}</span>
                        </div>
                        <span class="chevron" id="ch-${i}">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                        </span>
                    </div>
                    <div class="code-container" id="cw-${i}">
                        <div class="code-content">
                            <button class="copy-btn" onclick="copyCode(${i}, this)">Copy</button>
                            <pre>${highlightCode(p.code)}</pre>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderNumberGrid() {
            const container = document.getElementById('number-grid');
            container.innerHTML = problems.map((p, i) => `
                <div class="number-box" id="nbox-${i}" onclick="copyCode(${i}, this)" title="${p.title}">
                    <span>${p.num}</span>
                    <span class="copy-label">Copy</span>
                </div>
            `).join('');
        }

        function highlightCode(code) {
            // Simple regex-based highlight simulation
            return code
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/\b(class|public|private|struct|using|namespace|return|if|else|for|while|do|int|long|double|float|char|void|bool|vector|unordered_map|string|set|abs|new|nullptr|int_max|int_min|long_long|size)\b/g, '<span class="k">$1</span>')
                .replace(/\b(\d+)\b/g, '<span class="n">$1</span>')
                .replace(/(\/\/.+)/g, '<span class="c">$1</span>')
                .replace(/(".*?")/g, '<span class="s">$1</span>')
                .replace(/(\w+)(?=\s*\()/g, '<span class="f">$1</span>');
        }

        renderNumberGrid();
        renderCards();
    </script>
