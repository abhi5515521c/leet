<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode C++ | Q1–500 Compendium</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --surface: #0a0a0c;
            --surface2: #121217;
            --border: rgba(0, 243, 255, 0.1);
            --border-accent: rgba(0, 243, 255, 0.4);
            --accent: #00f3ff;
            --accent-glow: rgba(0, 243, 255, 0.2);
            --danger: #ff0055;
            --text: #e0e0e0;
            --dim: #707080;
            --diff-easy: #00ff41;
            --diff-medium: #ffea00;
            --diff-hard: #ff0055;
            --mono: 'Space Mono', monospace;
            --sans: 'Space Grotesk', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: crosshair;
        }

        body {
            background: var(--bg);
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            padding: 2rem 1rem 4rem;
            overflow-x: hidden;
        }

        /* ─── SCANLINE ─── */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
        }

        /* ─── HEADER ─── */
        header {
            text-align: center;
            margin-bottom: 4rem;
            position: relative;
        }

        header h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -2px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 40%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--accent-glow));
            font-family: var(--mono);
        }

        header p {
            color: var(--accent);
            margin-top: .5rem;
            font-size: 0.8rem;
            font-family: var(--mono);
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .ai-badge {
            display: inline-flex;
            align-items: center;
            gap: .6rem;
            margin-top: 1.5rem;
            padding: .5rem 1.2rem;
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid var(--border-accent);
            border-radius: 4px;
            font-size: .7rem;
            color: var(--accent);
            font-family: var(--mono);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ai-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        /* ─── CONTROLS ─── */
        .controls {
            position: sticky;
            top: 1rem;
            z-index: 100;
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(20px);
            padding: 1rem;
            border: 1px solid var(--border-accent);
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .search-container {
            position: relative;
            flex: 1;
            min-width: 280px;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            width: 1.2rem;
            height: 1.2rem;
            color: var(--accent);
            pointer-events: none;
            z-index: 2;
        }

        #search {
            width: 100%;
            height: 44px;
            background: #000;
            border: 1px solid var(--border);
            padding: 0 1rem 0 3rem;
            color: var(--accent);
            font-family: var(--mono);
            font-size: 0.85rem;
            outline: none;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        #search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-row {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap
        }

        .btn {
            height: 44px;
            padding: 0 1.2rem;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 243, 255, 0.05);
        }

        select.btn {
            appearance: none;
            background: #000;
            padding-right: 2rem;
            position: relative;
        }

        /* ─── CUSTOM DROPDOWN ─── */
        .custom-select {
            position: relative;
            min-width: 180px;
            font-family: var(--mono);
        }

        .select-trigger {
            height: 44px;
            padding: 0 1.2rem;
            border: 1px solid var(--border);
            background: #000;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .select-trigger:hover {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .select-options {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            background: #08080a;
            border: 1px solid var(--accent);
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .select-options.open {
            display: block;
        }

        .select-option {
            padding: 0.8rem 1.2rem;
            font-size: 0.75rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(0, 243, 255, 0.05);
        }

        .select-option:last-child {
            border-bottom: none;
        }

        .select-option:hover {
            background: rgba(0, 243, 255, 0.1);
            color: var(--accent);
            padding-left: 1.5rem;
        }

        .select-option.selected {
            color: var(--accent);
            background: rgba(0, 243, 255, 0.05);
        }

        /* ─── STATUS ─── */
        .status-bar {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--dim);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-bar span {
            color: var(--accent);
        }

        /* ─── SECTION LABEL ─── */
        .section-label {
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--dim);
            padding-left: .25rem;
            margin: .5rem 0 .75rem;
            display: flex;
            align-items: center;
            gap: .75rem;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent)
        }

        /* ─── NUMBER GRID ─── */
        .number-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(62px, 1fr));
            gap: .6rem;
            margin-bottom: 2.5rem;
        }

        .nbox {
            aspect-ratio: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 0.9rem;
            color: var(--dim);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .nbox:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            color: var(--accent);
            z-index: 10;
        }

        .nbox.cached {
            color: var(--text);
            border-color: var(--border-accent);
        }

        .nbox.copied-box {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .nbox .tip {
            position: absolute;
            bottom: -16px;
            font-size: .55rem;
            color: var(--accent);
            transition: bottom .25s;
            text-transform: uppercase;
            letter-spacing: .05em
        }

        .nbox:hover .tip {
            bottom: 6px
        }

        /* ─── CARDS ─── */
        .problem-card {
            background: var(--surface);
            border: 1px solid var(--border);
            margin-bottom: 1rem;
            overflow: hidden;
            transition: all 0.3s;
        }

        .problem-card:hover {
            border-color: var(--border-accent);
            transform: translateX(5px);
            box-shadow: -5px 0 0 var(--accent);
        }

        .card-header {
            padding: 1.25rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        .num-badge {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--accent);
            border: 1px solid var(--border-accent);
            padding: 2px 8px;
            min-width: 45px;
            text-align: center;
        }

        .problem-title {
            flex: 1;
            font-weight: 500;
            font-size: 1rem;
            font-family: var(--sans);
            letter-spacing: 0.5px;
            color: #fff;
        }

        .meta-tags {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .tag {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--dim);
            text-transform: uppercase;
        }

        .diff-tag {
            font-weight: 700;
            letter-spacing: 1px;
        }

        .diff-easy { color: var(--diff-easy); }
        .diff-medium { color: var(--diff-medium); }
        .diff-hard { color: var(--diff-hard); }

        .chevron {
            color: var(--dim);
            transition: transform 0.3s;
        }

        .chevron.open {
            transform: rotate(180deg);
            color: var(--accent);
        }

        /* ─── CODE CONTAINER ─── */
        .code-container {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: #000;
        }

        .code-container.open {
            grid-template-rows: 1fr;
        }

        .code-content {
            overflow: hidden;
            position: relative;
            border-top: 1px solid var(--border);
        }

        /* ─── CODE ─── */
        /* ─── CODE ─── */
        .copy-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 5px 12px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--accent);
            font-family: var(--mono);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            border-color: var(--accent);
            background: rgba(0, 243, 255, 0.05);
        }

        .copy-btn.copied-btn {
            border-color: var(--diff-easy);
            color: var(--diff-easy);
        }

        pre {
            padding: 2.5rem 1.25rem 1.25rem;
            font-family: var(--mono);
            font-size: 0.8rem;
            line-height: 1.6;
            overflow-x: auto;
            color: #d1d5db;
        }

        /* Syntax highlight classes */
        .k { color: var(--accent); font-weight: 700; }
        .cmt { color: #6b7280; font-style: italic; }
        .s { color: var(--diff-medium); }
        .n { color: #ec4899; }
        .f { color: #8b5cf6; }

        /* ─── ANIMATIONS ─── */
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-18px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        @keyframes borderPulse {

            0%,
            100% {
                border-color: var(--accent)
            }

            50% {
                border-color: rgba(99, 179, 237, .2)
            }
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, .15)
        }

        @media(max-width:600px) {
            .meta-tags {
                display: none
            }

            .problem-title {
                font-size: .9rem
            }

            .nbox {
                font-size: .78rem
            }
        }

        /* ─── TOAST ─── */
        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #000;
            color: var(--accent);
            padding: 0.75rem 1.5rem;
            font-family: var(--mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid var(--accent);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 10000;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        #toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>
    <div class="container">

        <header>
            <h1>LeetCode C++ Solutions</h1>
            <p>Q1 – Q100 Complete Compendium</p>
            <div class="ai-badge"><span class="ai-dot"></span> 100% Hardcoded for Offline Speed</div>
        </header>

        <div class="controls">
            <div class="search-container">
                <div class="search-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <input type="text" id="search" placeholder="Search by problem number or keywords..." oninput="filterAll()">
                <div class="search-glow"></div>
            </div>
            <div class="btn-row">
                <div class="custom-select" id="difficultyDropdown">
                    <div class="select-trigger" onclick="toggleDropdown()">
                        <span id="selectedDiffText">All Difficulties</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                    <div class="select-options" id="dropdownOptions">
                        <div class="select-option selected" onclick="selectOption('', 'All Difficulties', this)">All Difficulties</div>
                        <div class="select-option" onclick="selectOption('Easy', 'Easy', this)">Easy</div>
                        <div class="select-option" onclick="selectOption('Medium', 'Medium', this)">Medium</div>
                        <div class="select-option" onclick="selectOption('Hard', 'Hard', this)">Hard</div>
                    </div>
                </div>
                <button class="btn" onclick="expandAll()" title="Expand All">↕ Expand</button>
                <button class="btn" onclick="collapseAll()" title="Collapse All">↕ Collapse</button>
            </div>
        </div>

        <div class="status-bar" id="statusBar">Loading solutions...</div>

        <div class="section-label">Quick Copy Grid — click to copy solution instantly</div>
        <div id="numberGrid" class="number-grid"></div>

        <div class="section-label">Detailed Solutions</div>
        <div id="cards"></div>

    </div>

    <div id="toast">Copied!</div>

    <script src="data.js"></script>
    <script>
        // State
        let visibleProblems = [...allProblems];
        let currentDifficulty = "";

        function diffClass(d) { return d === 'Easy' ? 'diff-easy' : d === 'Hard' ? 'diff-hard' : 'diff-medium'; }

        // ─── CUSTOM DROPDOWN LOGIC ───
        function toggleDropdown() {
            document.getElementById('dropdownOptions').classList.toggle('open');
        }

        function selectOption(val, text, el) {
            currentDifficulty = val;
            document.getElementById('selectedDiffText').textContent = text;
            document.getElementById('dropdownOptions').classList.remove('open');
            
            // UI state
            document.querySelectorAll('.select-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            
            filterAll();
        }

        // Close dropdown when clicking outside
        window.addEventListener('click', (e) => {
            if (!document.getElementById('difficultyDropdown').contains(e.target)) {
                document.getElementById('dropdownOptions').classList.remove('open');
            }
        });

        // ─── RENDER NUMBER GRID ───
        function renderGrid() {
            const grid = document.getElementById('numberGrid');
            grid.innerHTML = allProblems.map(([num, title, diff]) => {
                return `<div class="nbox cached" id="nbox-${num}" onclick="handleNboxClick(${num})" title="${title} (${diff})">
      <span>${num}</span>
      <span class="tip">Ready</span>
    </div>`;
            }).join('');
        }

        // ─── RENDER CARDS ───
        function renderCards() {
            const container = document.getElementById('cards');
            container.innerHTML = visibleProblems.map(([num, title, diff]) => {
                const hc = hardcoded[num];
                return `<div class="problem-card" id="card-${num}">
      <div class="card-header" onclick="toggleCard(${num})">
        <span class="num-badge">#${num}</span>
        <span class="problem-title">${title}</span>
        <div class="meta-tags">
          ${hc ? `<span class="tag">${hc.time}</span><span class="tag">${hc.space}</span>` : ''}
          <span class="tag diff-tag ${diffClass(diff)}">${diff}</span>
        </div>
        <span class="chevron" id="ch-${num}">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </span>
      </div>
      <div class="code-container" id="cw-${num}">
        <div class="code-content" id="cc-${num}">
          <button class="copy-btn" onclick="copyCode(${num},this)">Copy</button>
          <pre>${hlCode(hc ? hc.code : '// Solution not found')}</pre>
        </div>
      </div>
    </div>`;
            }).join('');
        }

        // ─── TOGGLE CARD ───
        function toggleCard(num) {
            const cw = document.getElementById('cw-' + num);
            const ch = document.getElementById('ch-' + num);
            const isOpen = cw.classList.toggle('open');
            ch.classList.toggle('open', isOpen);
        }

        // ─── COPY ───
        async function copyCode(num, btn) {
            const hc = hardcoded[num];
            if (!hc) return;
            try {
                await navigator.clipboard.writeText(hc.code);
                btn.classList.add('copied-btn');
                btn.textContent = 'Copied!';
                showToast('Copied #' + num + ' to clipboard');
                setTimeout(() => { btn.classList.remove('copied-btn'); btn.textContent = 'Copy'; }, 2000);
            } catch (e) { }
        }

        async function handleNboxClick(num) {
            const nbox = document.getElementById('nbox-' + num);
            const hc = hardcoded[num];
            if (!hc) return;

            // Auto-open card
            const cw = document.getElementById('cw-' + num);
            const ch = document.getElementById('ch-' + num);
            if (cw && !cw.classList.contains('open')) {
                cw.classList.add('open');
                if (ch) ch.classList.add('open');
            }

            try {
                await navigator.clipboard.writeText(hc.code);
                const orig = nbox.innerHTML;
                nbox.classList.add('copied-box');
                nbox.innerHTML = '<span>✓</span>';
                showToast('Copied #' + num + ': ' + hc.title);
                setTimeout(() => { nbox.classList.remove('copied-box'); nbox.innerHTML = orig; }, 2000);
            } catch (e) { }

            // Scroll card into view
            const card = document.getElementById('card-' + num);
            if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // ─── FILTER ───
        function filterAll() {
            const q = document.getElementById('search').value.toLowerCase().trim();
            const diff = currentDifficulty;

            visibleProblems = allProblems.filter(([num, title, d]) => {
                const matchQ = !q || String(num).includes(q) || title.toLowerCase().includes(q);
                const matchD = !diff || d === diff;
                return matchQ && matchD;
            });

            renderCards();

            allProblems.forEach(([num, , d]) => {
                const nbox = document.getElementById('nbox-' + num);
                if (!nbox) return;
                const matchQ = !q || String(num).includes(q) || allProblems.find(p => p[0] === num)?.[1].toLowerCase().includes(q);
                const matchD = !diff || d === diff;
                nbox.style.display = (matchQ && matchD) ? '' : 'none';
            });

            document.getElementById('statusBar').innerHTML =
                `Showing <span>${visibleProblems.length}</span> of <span>${allProblems.length}</span> solutions`;
        }

        function expandAll() {
            visibleProblems.forEach(([num]) => {
                const cw = document.getElementById('cw-' + num);
                const ch = document.getElementById('ch-' + num);
                if (cw && !cw.classList.contains('open')) {
                    cw.classList.add('open');
                    if (ch) ch.classList.add('open');
                }
            });
        }

        function collapseAll() {
            allProblems.forEach(([num]) => {
                const cw = document.getElementById('cw-' + num);
                const ch = document.getElementById('ch-' + num);
                if (cw) cw.classList.remove('open');
                if (ch) ch.classList.remove('open');
            });
        }

        // ─── SYNTAX HIGHLIGHT ───
        function hlCode(code) {
            const esc = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return esc
                .replace(/(\/\/.+)/g, '<span class="cmt">$1</span>')
                .replace(/("(?:[^"\\]|\\.)*")/g, '<span class="s">$1</span>')
                .replace(/\b(class|struct|public|private|protected|using|namespace|return|if|else|for|while|do|new|delete|nullptr|true|false|const|static|inline|auto|void|bool|int|long|short|char|double|float|unsigned|signed|size_t|string|vector|unordered_map|unordered_set|map|set|queue|stack|deque|pair|tuple|shared_ptr|unique_ptr|include|define)\b/g, '<span class="k">$1</span>')
                .replace(/\b(\d+[uUlLfF]*)\b/g, '<span class="n">$1</span>')
                .replace(/(\w+)(?=\s*\()/g, '<span class="f">$1</span>');
        }

        // ─── TOAST ───
        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
        }

        // ─── INIT ───
        renderGrid();
        renderCards();
        document.getElementById('statusBar').innerHTML =
            `All <span>${allProblems.length}</span> solutions loaded and ready for instant use`;
    </script>
</body>

</html>
